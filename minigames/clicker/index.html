<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Clicker - LeGC Arcade</title>
    <style>
        body { background: #2c3e50; color: white; text-align: center; font-family: sans-serif; padding-top: 30px; }
        #cookie { font-size: 80px; cursor: pointer; user-select: none; transition: transform 0.1s; display:inline-block; }
        #cookie:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <h2>Cookie Clicker</h2>
    <div id="cookie">🍪</div>
    <p style="font-size:20px;">Score: <span id="clicks">0</span></p>
    <script>
        let count = 0;
        document.getElementById("cookie").onclick = () => {
            count++; document.getElementById("clicks").innerText = count;
        };
    </script>
</body>
</html>
