<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Snake - LeGC Arcade</title>
    <style>
        body { background: #111; color: #fff; text-align: center; font-family: sans-serif; margin:0; padding:10px; overflow:hidden;}
        canvas { background: #000; border: 4px solid #333; display: block; margin: 10px auto; max-width:90%; height:auto;}
        h2 { margin: 5px; color: #1877f2; }
    </style>
</head>
<body>
    <h2>Arcade Snake</h2>
    <p style="margin:2px;">Use Arrow Keys or Swipe. Score: <span id="score">0</span></p>
    <canvas id="game" width="320" height="320"></canvas>
    <script>
        const canvas = document.getElementById("game");
        const context = canvas.getContext("2d");
        const grid = 16; let count = 0, score = 0;
        let snake = { x: 160, y: 160, dx: grid, dy: 0, cells: [], maxCells: 4 };
        let apple = { x: 96, y: 96 };
        function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min)) + min; }
        function loop() {
            requestAnimationFrame(loop);
            if (++count < 6) return;
            count = 0;
            context.clearRect(0,0,canvas.width,canvas.height);
            snake.x += snake.dx; snake.y += snake.dy;
            if (snake.x < 0) snake.x = canvas.width - grid;
            else if (snake.x >= canvas.width) snake.x = 0;
            if (snake.y < 0) snake.y = canvas.height - grid;
            else if (snake.y >= canvas.height) snake.y = 0;
            snake.cells.unshift({x: snake.x, y: snake.y});
            if (snake.cells.length > snake.maxCells) snake.cells.pop();
            context.fillStyle = "red"; context.fillRect(apple.x, apple.y, grid-1, grid-1);
            context.fillStyle = "#2ecc71";
            snake.cells.forEach(function(cell, index) {
                context.fillRect(cell.x, cell.y, grid-1, grid-1);
                if (cell.x === apple.x && cell.y === apple.y) {
                    snake.maxCells++; score++;
                    document.getElementById("score").textContent = score;
                    apple.x = getRandomInt(0, 20) * grid;
                    apple.y = getRandomInt(0, 20) * grid;
                }
                for (let i = index + 1; i < snake.cells.length; i++) {
                    if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
                        snake.x = 160; snake.y = 160; snake.cells = []; snake.maxCells = 4;
                        snake.dx = grid; snake.dy = 0; score = 0;
                        document.getElementById("score").textContent = score;
                        apple.x = getRandomInt(0, 20) * grid;
                        apple.y = getRandomInt(0, 20) * grid;
                    }
                }
            });
        }
        document.addEventListener("keydown", function(e) {
            if (e.which === 37 && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }
            else if (e.which === 38 && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; }
            else if (e.which === 39 && snake.dx === 0) { snake.dx = grid; snake.dy = 0; }
            else if (e.which === 40 && snake.dy === 0) { snake.dy = grid; snake.dx = 0; }
        });
        requestAnimationFrame(loop);
    </script>
</body>
</html>
